name: Deploy Theme to WP Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.WPE_SFTP_HOST }}
          username: ${{ secrets.WPE_SFTP_USERNAME }}
          password: ${{ secrets.WPE_SFTP_PASSWORD }}
          local-dir: ./
          server-dir: /wp-content/themes/heru/